version: "3.9"

services:
  resolver:
    build:
      args:
        TORCH_INDEX_URL: ${RESOLVER_TORCH_INDEX_URL_GPU:-https://download.pytorch.org/whl/cu124}
        TORCH_VERSION: ${RESOLVER_TORCH_VERSION:-2.5.1}
    gpus: all
    environment:
      EMBED_DEVICE: ${EMBED_DEVICE:-cuda}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
